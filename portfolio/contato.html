<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <title>Contato - Café Central</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/contato.css">
    </head>
    <body>
            <!-- Cabeçalho reutilizado -->
            <header class="topo">
            <div class="logo">
                <a href="../index.html">
                    <img src="../imagens/imgportifolio.png">
                </a>
                </div>
                <nav class="menu">
                    <a href="../index.html" >Início</a>
                    <a href="../portfolio/sobre.html">Sobre</a>
                    <a href="../portfolio/projetos.html">Projetos</a>
                    <a href="../portfolio/contato.html"class="ativo">Contato</a>
                    <a href="../portfolio/certificados.html">Certificados</a>
                    
                </nav>
            </header>


            <main class="contato">
                <div class="form-container">
                    <h1>Fale Conosco</h1>
                    <form id="formContato">
                        <div class="campo">
                            <label for="nome">Nome:</label>
                            <input type="text" id="nome" name="nome" required placeholder="Digite seu Nome">
                        </div>
                        <div class="campo">
                            <label for="email">E-mail:</label>
                            <input type="email" id="email" name="email" required placeholder="Digite seu Email">
                        </div>
                        <div class="campo">
                            <label for="mensagem">Mensagem:</label>
                            <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Digite sua Mensagem"></textarea>
                        </div>
                        <button type="submit" class="btn-enviar">Enviar Mensagem</button>
                    </form>
                </div>
            </main>

        </footer>

            <script src="../js/contato.js"></script>
    </body>
    </html>
